<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="greyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="ashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#bdc3c7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7f8c8d;stop-opacity:1" />
        </linearGradient>
    </defs>
    <circle cx="250" cy="250" r="240" fill="url(#greyGrad)" stroke="#bdc3c7" stroke-width="10"/>
    <path d="M250 100 L150 400 L200 400 L250 250 L300 400 L350 400 Z" fill="url(#ashGrad)" />
    <path d="M250 120 L270 200 L230 200 Z" fill="#ffffff" opacity="0.8">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
    </path>
    <text x="250" y="460" font-family="Arial" font-size="40" fill="#bdc3c7" text-anchor="middle" font-weight="bold">ASH TOKEN</text>
</svg>